<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Certificate Verification and Validation using Blockchain</title>

  <meta name="keywords" content="Blockchain Certificate Verification, HTML CSS Template" />
  <meta name="description" content="A blockchain-based certificate verification system." />
  
  <link rel="stylesheet" href="{{ url_for('static', filename='templatemo_style.css') }}">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f6f9;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 10px 0;
    }

    .logo {
      height: 60px;
    }

    .logo-container h1 {
      color: white;
      font-size: 22px;
    }

    .section_w620 {
      background: #ffffff;
      border-radius: 10px;
      padding: 30px 40px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.1);
      animation: fadeIn 1s ease-in-out;
      margin-top: 30px;
    }

    .section_w620 img {
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      transition: transform 0.3s ease;
    }

    .section_w620 img:hover {
      transform: scale(1.03);
    }

    .msg {
      margin-top: 20px;
      padding: 10px;
      background: #fff3f3;
      border: 1px solid #ffc4c4;
      border-radius: 8px;
      color: #d60000;
      font-weight: bold;
    }

    ul {
      list-style: none;
      padding-left: 0;
    }

    ul li.nlink a {
      color: white;
      text-decoration: none;
      padding: 10px 15px;
      display: inline-block;
      transition: background 0.3s;
    }

    ul li.nlink a:hover {
      background: #3498db;
      border-radius: 5px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .section_w620 {
        padding: 20px;
      }

      .section_w620 img {
        width: 100%;
        height: auto;
      }
    }

    /* ✅ Footer Styling */
    footer {
      margin-top: 50px;
      background: #2c3e50;
      color: white;
      text-align: center;
      padding: 20px 10px;
      font-size: 14px;
    }

    footer a {
      color: #ccc;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  {% include 'header.html' %}

  <div id="templatemo_menu_wrapper">
    <div id="templatemo_menu">
      <ul>
        <li class="nlink"><a href="AddCertificate">Upload&nbsp;New&nbsp;Certificates</a></li>
        <li class="nlink"><a href="ViewCertificates">View&nbsp;Certificates&nbsp;Details</a></li>
        <li class="nlink"><a href="ViewCompanies">View&nbsp;Company&nbsp;Details</a></li>
        <li class="nlink"><a href="index">Logout</a></li>
      </ul>
    </div>
  </div>

  <div id="templatemo_content_wrapper">
    <div id="templatemo_content">

      <div class="section_w620 fl margin_right_50">
        <h3 style="text-align: center; color: #2c3e50; margin-bottom: 20px;">Certificate Verification Overview</h3>

        <center>
          <img src="{{ url_for('static', filename='tra.jpg') }}" alt="Certificate Illustration" width="360" height="200" />
        </center>

        {% if msg %}
        <div class="msg">
          <center>{{ msg }}</center>
        </div>
        {% endif %}
      </div>

    </div>
  </div>

  <footer style="background-color: #2c3e50; color: #ecf0f1; text-align: center; padding: 1rem 0; font-size: 0.9rem;">
    &copy; Certificate Verification System. Developed with ❤️ using Blockchain.
  </footer>

</body>
</html>
