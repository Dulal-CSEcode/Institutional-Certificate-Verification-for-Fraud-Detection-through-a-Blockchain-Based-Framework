<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8" />
  <title>Certificate Verification and Validation using Blockchain</title>

  <meta name="keywords" content="Specific Template, HTML CSS, free website template" />
  <meta name="description" content="Specific Template is a free website template provided by TemplateMo.com" />
  
  <link rel="stylesheet" href="{{ url_for('static', filename='templatemo_style.css') }}">

  <style>
    .logo-container {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 10px 0;
    }
    .logo {
      height: 60px;
    }
    .logo-container h1 {
      color: white;
      font-size: 22px;
    }
  </style>

  <script>
    function validate() {
      var x = document.forms["f1"]["t1"].value;
      var y = document.forms["f1"]["t2"].value;
      if (x == null || x == "") {
        alert("Username must be entered");
        document.f1.t1.focus();
        return false;
      }
      if (y == null || y == "") {
        alert("Password must be entered");
        document.f1.t2.focus();
        return false;
      }
      return true;
    }
  </script>
</head>

<body>

  <!-- ✅ Reusable Header -->
  {% include 'header.html' %}

  <!-- Navigation Menu -->
  <div id="templatemo_menu_wrapper">
    <div id="templatemo_menu">
      <ul>
        <li class="nlink"><a href="index">Home</a></li>
        <li class="nlink"><a href="AdminLogin">Educational&nbsp;Authority&nbsp;Login</a></li>
        <li class="nlink"><a href="Login">Company&nbsp;Login&nbsp;Here</a></li>
        <li class="nlink"><a href="Signup">New&nbsp;Company&nbsp;Signup&nbsp;Here</a></li>
      </ul>
    </div>
  </div>

  <div class="entry">
    <br/><br/><br/><br/>

    <div class="msg">
      <font size="3" color="red"><center>{{ msg }}</center></font>
    </div>

    <br/><br/>
    <center><h3 style="color: black;">Admin Login Screen</h3></center>

    <form name="f1" method="post" action="/AdminLoginAction" onsubmit="return validate();">
      <br/><br/>
      <table align="center" width="30%" class="notepad">
        <tr>
          <th align="left"><font size="2" color="black">Username</font></th>
          <td>&nbsp;<input type="text" name="t1" value='' onchange='fnCallChkAvailability(this)'>
            <div id='nameid'></div>
          </td>
        </tr>
        <tr>
          <th align="left"><font size="2" color="black">Password</font></th>
          <td>&nbsp;<input type='password' name="t2" value=''></td>
        </tr>
        <tr>
          <td></td>
          <td><input type="submit" value="Login"></td>
        </tr>
      </table>
    </form>
  </div>


  <footer style="background-color: #2c3e50; color: #ecf0f1; text-align: center; padding: 1rem 0; font-size: 0.9rem;">
    &copy; Certificate Verification System. Developed with ❤️ using Blockchain.
  </footer>

</body>
</html>
